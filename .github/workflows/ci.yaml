name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip build, deploy existing image'
        type: boolean
        default: false

env:
  GO_VERSION: "1.25"
  REGISTRY: quay.io
  IMAGE_NAME: nabu/nabu

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      code: ${{ startsWith(github.ref, 'refs/tags/v') || steps.filter.outputs.code }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - '!**/*_test.go'
              - 'go.mod'
              - 'go.sum'
              - 'web/**'
              - 'migrations/**'
              - 'Containerfile'
              - 'compose*.yaml'
              - '.github/workflows/**'
              - 'Makefile'
              - 'scripts/**'
            tests:
              - '**/*_test.go'

  parity:
    name: Client Parity
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: client
        with:
          filters: |
            pwa:
              - 'web/static/js/**'
              - 'web/static/css/**'
              - 'web/templates/**'
            ios:
              - 'ios/**'
      - name: Check PR description for parity statement
        if: steps.client.outputs.pwa == 'true' || steps.client.outputs.ios == 'true'
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_BODY_LOWER=$(echo "$PR_BODY" | tr '[:upper:]' '[:lower:]')

          if echo "$PR_BODY_LOWER" | grep -q "pwa and ios both updated"; then
            echo "::notice::✅ Parity: PWA and iOS both updated."
            exit 0
          fi
          if echo "$PR_BODY_LOWER" | grep -q "pwa-only change"; then
            echo "::notice::✅ Parity: PWA-only change acknowledged."
            exit 0
          fi
          if echo "$PR_BODY_LOWER" | grep -q "ios-only change"; then
            echo "::notice::✅ Parity: iOS-only change acknowledged."
            exit 0
          fi

          echo "::error::❌ PR changes client code (PWA or iOS) but description is missing a parity statement."
          echo ""
          echo "Required — include one of these verbatim in the PR description:"
          echo '  - "PWA and iOS both updated."'
          echo '  - "PWA-only change; iOS not affected because <reason>."'
          echo '  - "iOS-only change; PWA not affected because <reason>."'
          echo ""
          echo "See docs/plans/client-parity.md for the feature matrix."
          exit 1

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6.2

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.tests == 'true'
    services:
      postgres:
        image: docker.io/postgres:17-alpine
        env:
          POSTGRES_DB: nabu
          POSTGRES_USER: nabu
          POSTGRES_PASSWORD: nabu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nabu -d nabu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go mod download
      - run: go test -v -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgres://nabu:nabu@localhost:5432/nabu?sslmode=disable
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          flags: go
          token: ${{ secrets.CODECOV_TOKEN }}

  test-js:
    name: JS Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.tests == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: JS tests
        run: node --test web/static/js/tests/runner.js

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.tests == 'true'
    services:
      mailpit:
        image: axllent/mailpit:v1.27
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm
        run: corepack enable pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
      - name: Run E2E tests
        run: ./scripts/e2e.sh

  build-image:
    name: Build Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [changes, secrets, lint, test-go, test-js, e2e]
    if: >
      needs.changes.outputs.code == 'true' &&
      needs.secrets.result == 'success' &&
      needs.lint.result == 'success' &&
      needs.test-go.result == 'success' &&
      needs.test-js.result == 'success' &&
      needs.e2e.result == 'success' &&
      github.actor != 'dependabot[bot]'
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to Quay.io
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build image (no push, PR/main)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/${{ matrix.arch }}
          build-args: BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Build and push by digest (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/${{ matrix.arch }}
          build-args: BUILD_VERSION=${{ steps.version.outputs.version }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  scan-and-push:
    name: Scan, Sign & Push Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build-image]
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      github.actor != 'dependabot[bot]'
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      tag: ${{ steps.tag.outputs.tag }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Get manifest digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.digest.outputs.digest }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [scan-and-push]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Container Image

            ```bash
            podman pull quay.io/nabu/nabu:${{ steps.version.outputs.version }}
            ```

            **Available tags:**
            - `quay.io/nabu/nabu:${{ steps.version.outputs.version }}`
            - `quay.io/nabu/nabu:latest`

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [scan-and-push]
    if: >
      (
        github.event_name == 'workflow_dispatch' &&
        (needs.scan-and-push.result == 'success' || needs.scan-and-push.result == 'skipped')
      ) ||
      (
        github.event_name == 'push' &&
        startsWith(github.ref, 'refs/tags/v') &&
        needs.scan-and-push.result == 'success'
      )
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git merge-base --is-ancestor HEAD origin/main || {
            echo "ERROR: Tag is not reachable from main."
            echo "All deploys must happen after a merge to main. Never deploy from a branch."
            echo "Merge your branch to main first, then tag on main."
            exit 1
          }

      - name: Install cloudflared
        run: |
          CLOUDFLARED_VERSION="2026.1.2"
          CLOUDFLARED_SHA256="e157c54e929cc289cbd53860453168c2fe3439eb55e2e965a56579252585d9c1"
          curl -fsSL "https://github.com/cloudflare/cloudflared/releases/download/${CLOUDFLARED_VERSION}/cloudflared-linux-amd64" -o cloudflared
          echo "${CLOUDFLARED_SHA256}  cloudflared" | sha256sum -c -
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          IMAGE_DIGEST: ${{ needs.scan-and-push.outputs.digest }}
          IMAGE_TAG: ${{ needs.scan-and-push.outputs.tag }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_NOTIFY_EMAILS: ${{ secrets.BACKUP_NOTIFY_EMAILS }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat >> ~/.ssh/config << 'SSHCONFIG'
          Host ssh.yearofbingo.com
            User deploy
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking accept-new
          SSHCONFIG

          # Substitute image digest into compose file
          if [ -n "${IMAGE_DIGEST}" ]; then
            sed "s|image: quay.io/nabu/nabu:latest|# tag: ${IMAGE_TAG}\n    image: quay.io/nabu/nabu@${IMAGE_DIGEST}|" \
              compose.server.yaml > compose.server.deploy.yaml
          else
            cp compose.server.yaml compose.server.deploy.yaml
          fi

          # Copy compose file and scripts to server
          scp compose.server.deploy.yaml ssh.yearofbingo.com:/opt/nabu/compose.yaml
          scp scripts/backup.sh scripts/restore.sh scripts/verify-backup.sh scripts/notify-email.sh ssh.yearofbingo.com:/opt/nabu/scripts/

          # Deploy
          ssh ssh.yearofbingo.com << EOF
            cd /opt/nabu

            chmod 0755 scripts/*.sh

            # Write .env with all secrets
            cat > .env << 'ENVFILE'
          DB_PASSWORD=${DB_PASSWORD}
          SMTP_PASS=${SMTP_PASS}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
          VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
          VAPID_SUBJECT=${VAPID_SUBJECT}
          BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
          BACKUP_NOTIFY_EMAILS=${BACKUP_NOTIFY_EMAILS}
          RESEND_API_KEY=${RESEND_API_KEY}
          EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS}
          ENVFILE
            chmod 600 .env

            # Create/update rclone config for R2 backups (separate file to avoid conflict with yearofbingo)
            mkdir -p ~/.config/rclone
            cat > ~/.config/rclone/rclone-nabu.conf << 'RCLONECONF'
          [r2-nabu]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          no_check_bucket = true
          RCLONECONF
            chmod 600 ~/.config/rclone/rclone-nabu.conf

            # Pull new image and restart
            podman-compose pull
            podman-compose down || true
            podman-compose up -d
          EOF
