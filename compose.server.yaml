# Production compose file — deployed to /opt/nabu/compose.yaml by CI/CD
# Shares the choresy_default network for DB access; does not run its own postgres.

services:
  app:
    image: quay.io/nabu/nabu:latest   # CI substitutes digest at deploy time
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - APP_ENV=production
      - APP_BASE_URL=https://nabu-app.com
      - SERVER_SECURE=true
      - DATABASE_URL=postgres://choresy:${DB_PASSWORD}@postgres:5432/choresy?sslmode=disable
      - SMTP_HOST=smtp.resend.com
      - SMTP_PORT=587
      - SMTP_USER=resend
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=noreply@yearofbingo.com
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    restart: unless-stopped
    networks:
      - choresy_default

networks:
  choresy_default:
    external: true
