# Production compose file for Hetzner server deployment
# Uses persistent storage on /mnt/data volume and port 80

services:
  app:
    image: quay.io/dave/choresy:latest
    ports:
      - "80:8080"
    environment:
      PORT: "8080"
      APP_ENV: "production"
      APP_BASE_URL: "https://choresy.app"
      SERVER_SECURE: "true"
      DATABASE_URL: "postgres://choresy:${DB_PASSWORD}@postgres:5432/choresy?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY}"
      VAPID_SUBJECT: "${VAPID_SUBJECT}"
      SESSION_SECRET: "${SESSION_SECRET}"
      CSRF_SECRET: "${CSRF_SECRET}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_USER: choresy
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: choresy
    volumes:
      - /mnt/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U choresy -d choresy"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - /mnt/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
