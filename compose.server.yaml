# Production compose file — deployed to /opt/nabu/compose.yaml by CI/CD
# App shares the nabu_default network with the standalone nabu_postgres_1 container.
# Postgres is run separately (see cloud-init.yaml for provisioning).

services:
  app:
    image: quay.io/nabu/nabu:latest   # CI substitutes digest at deploy time
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
      - APP_ENV=production
      - APP_BASE_URL=https://nabu-app.com
      - SERVER_SECURE=true
      - DATABASE_URL=postgres://nabu:${DB_PASSWORD}@nabu_postgres_1:5432/nabu?sslmode=disable
      - SMTP_HOST=smtp.resend.com
      - SMTP_PORT=587
      - SMTP_USER=resend
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=noreply@yearofbingo.com
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    restart: unless-stopped
    networks:
      - nabu_default

networks:
  nabu_default:
    external: true
