# Production compose file — deployed to /opt/choresy/compose.yaml by CI/CD

services:
  app:
    image: quay.io/dave/choresy:latest   # CI substitutes digest at deploy time
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - APP_ENV=production
      - APP_BASE_URL=https://choresy.yearofbingo.com
      - SERVER_SECURE=true
      - DATABASE_URL=postgres://choresy:${DB_PASSWORD}@postgres:5432/choresy?sslmode=disable
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      - POSTGRES_USER=choresy
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=choresy
    volumes:
      - /mnt/data/choresy/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U choresy -d choresy"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
