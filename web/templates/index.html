<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#F4EFE7">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{{.AppName}}</title>
    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="icon" href="/static/icons/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/static/icons/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/js/head-init.js?v={{.Version}}"></script>
  </head>
  <body data-google-oauth-enabled="{{.GoogleOAuthEnabled}}">
    <div class="app-shell">
      <header class="top-bar" id="top-bar" hidden>
        <span class="app-title">{{.AppName}} <span class="app-version">v{{.Version}}</span></span>
        <div class="top-bar-actions">
          <button type="button" class="icon-button" id="notifications-bell" aria-label="Notifications" data-action="open-notifications" hidden>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="badge" id="notification-badge" hidden></span>
          </button>
          <button type="button" class="avatar-circle" id="user-avatar" aria-label="User menu" data-nav="settings" hidden></button>
        </div>
      </header>

      <main id="app" aria-live="polite"></main>
    </div>

    <nav id="bottom-tabs" hidden aria-label="Main navigation">
      <a href="/chores" class="tab-item" data-nav="chores">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
          <rect x="9" y="3" width="6" height="4" rx="1"></rect>
          <path d="M9 14l2 2 4-4"></path>
        </svg>
        <span>Chores</span>
      </a>
      <a href="/calendar" class="tab-item" data-nav="calendar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>Calendar</span>
      </a>
      <a href="/schedule" class="tab-item" data-nav="schedule">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <span>Schedule</span>
      </a>
      <a href="/today" class="tab-item" data-nav="today">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>Home</span>
      </a>
      <a href="/history" class="tab-item" data-nav="history">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
        </svg>
        <span>History</span>
      </a>
      <a href="/settings" class="tab-item" data-nav="settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span>Settings</span>
      </a>
    </nav>

    <div id="toast-container" role="status" aria-live="polite" aria-atomic="false"></div>
    <div id="notif-panel-container" hidden></div>
    {{if .VAPIDPublicKey}}
    <meta name="vapid-public-key" content="{{.VAPIDPublicKey}}">
    {{end}}
    <script type="module" src="/static/js/app.js?v={{.Version}}"></script>
  </body>
</html>
