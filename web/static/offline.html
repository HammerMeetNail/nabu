<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#F4EFE7">
    <title>Nabu — Offline</title>
    <style>
      :root {
        --bg: #F4EFE7;
        --text: #1A1A2E;
        --primary: #2E86AB;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 24px;
      }
      .card {
        text-align: center;
        max-width: 320px;
      }
      .icon { font-size: 64px; margin-bottom: 16px; }
      h1 { font-size: 24px; margin-bottom: 8px; color: var(--text); }
      p { color: #6B7280; font-size: 16px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📡</div>
      <h1>You're offline</h1>
      <p>Check your internet connection and try again. Changes you make offline will sync when you're back online.</p>
    </div>
  </body>
</html>
