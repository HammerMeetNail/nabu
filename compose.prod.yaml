# Run the production image from quay.io locally
# Usage: podman compose -f compose.prod.yaml up

services:
  app:
    image: quay.io/nabu/nabu:latest
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      APP_ENV: "production"
      APP_BASE_URL: "http://localhost:8080"
      DATABASE_URL: "postgres://nabu:nabu@postgres:5432/nabu?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_USER: nabu
      POSTGRES_PASSWORD: nabu
      POSTGRES_DB: nabu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nabu -d nabu"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
