# Run the production image from quay.io locally
# Usage: podman compose -f compose.prod.yaml up

services:
  app:
    image: quay.io/dave/choresy:latest
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      APP_ENV: "production"
      APP_BASE_URL: "http://localhost:8080"
      DATABASE_URL: "postgres://choresy:choresy@postgres:5432/choresy?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_USER: choresy
      POSTGRES_PASSWORD: choresy
      POSTGRES_DB: choresy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U choresy -d choresy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
