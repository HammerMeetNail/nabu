services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      mailpit:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8080"
      APP_BASE_URL: "http://localhost:8080"
      DATABASE_URL: "postgres://choresy:choresy@postgres:5432/choresy?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "no-reply@choresy.local"
    ports:
      - "8080:8080"
  mailpit:
    image: docker.io/axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"
  postgres:
    image: docker.io/postgres:17-alpine
    environment:
      POSTGRES_DB: choresy
      POSTGRES_USER: choresy
      POSTGRES_PASSWORD: choresy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U choresy -d choresy"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
  redis:
    image: docker.io/library/redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
