services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    depends_on:
      mailpit:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      APP_BASE_URL: "http://localhost:8080"
      DATABASE_URL: "postgres://nabu:nabu@postgres:5432/nabu?sslmode=disable"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "no-reply@nabu.local"
      RATE_LIMIT_AUTH_MAX: "1000"
      RATE_LIMIT_GLOBAL_MAX: "1000000"
    ports:
      - "8080:8080"
  mailpit:
    image: docker.io/axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"
  postgres:
    image: docker.io/postgres:17-alpine
    environment:
      POSTGRES_DB: nabu
      POSTGRES_USER: nabu
      POSTGRES_PASSWORD: nabu
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nabu -d nabu"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
